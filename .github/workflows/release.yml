name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Binaryen
        run: |
          TAG=$(curl -sL https://api.github.com/repos/WebAssembly/binaryen/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/WebAssembly/binaryen/releases/download/${TAG}/binaryen-${TAG}-x86_64-linux.tar.gz" | tar xz
          echo "$PWD/binaryen-${TAG}/bin" >> $GITHUB_PATH

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Build WASM
        run: deno task build:wasm

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: target/wasm32-unknown-unknown/release-wasm/pxtone.wasm
